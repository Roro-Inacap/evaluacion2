<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="navbar navbar-light sticky-top flex-md-nowrap p-0 shadow" style="background-color: aquamarine;">
    <a class="navbar-brand col-md-3 col-lg-2 me-0 px-3" href="#">Panel principal</a>
  </header>

  <div class="container-fluid">
    <div class="row">
      <nav id="sidebarMenu" class="col-md-3 col-lg-2 d-md-block bg-light sidebar collapse">
        <div class="position-sticky pt-3">
          <ul class="nav flex-column">
            <li class="nav-item">
              <a class="nav-link active" href="dashboard.html">
                <span data-feather="home"></span>
                Dashboard
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="index.html">
                <span data-feather="file"></span>
                Cerrar sesión
              </a>
            </li>
          </ul>
        </div>
      </nav>

      <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 mb-3">
        <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
          <h1 class="h2">Dashboard</h1>
        </div>

        <div class="row justify-content-center">
          <div class="col-md-6 text-center">
            <button id="btnPresioname" class="btn btn-primary btn-lg">Presióname 15</button>
          </div>
        </div>

        <div class="row mt-4 justify-content-center px-2">
          <div class="col-md-6 card_shadow shadow">
            <div id="miCard" class="card border-primary">
              <div class="card-header" id="cardHeader">Estado Inicial</div>
              <div class="card-body">
                <img id="cardImg" src="img/bateria_full.jpg" class="img-fluid mb-3 img-center" alt="Imagen de la fase">
                <h5 class="card-title" id="cardTitle">Fase 1: Inicio</h5>
                <p class="card-text" id="cardDesc">Presiona el botón para comenzar el conteo. Esta es la fase inicial.</p>
              </div>
              <div class="card-footer" id="cardFooter">Número actual: 15</div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
