<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inicio de Sesión</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="d-flex align-items-center py-4 bg-body-tertiary text-center">
  <main class="form-signin w-100 m-auto card shadow inicio_sesion">
    <form class="loginForm">
      <div class="text-center mb-4">
        <div id="logoContainer" style="width:72px; height:57px; display:flex; align-items:center; justify-content:center; margin:0 auto;">
          <img src="img/box-arrow-in-right.svg" alt="Logo" width="72" height="57">
        </div>
      </div>
      <h1 class="h3 mb-3 fw-normal">Iniciar Sesión</h1>
      <div class="form-floating mb-2">
        <input type="text" class="form-control" id="usuario" placeholder="Usuario">
        <label for="usuario">Usuario</label>
      </div>
      <div class="form-floating mb-3">
        <input type="password" class="form-control" id="contrasena" placeholder="Contraseña">
        <label for="contrasena">Contraseña</label>
      </div>
      <div class="form-check text-start my-3">
        <input class="form-check-input" type="checkbox" value="remember-me" id="checkDefault">
        <label class="form-check-label" for="checkDefault">Recuérdame</label>
      </div>
      <button class="btn btn-primary py-2" type="button" id="btnLogin">Ingresar</button>
      <div class="mensaje_credenciales" style="font-size: x-small;">
        <br>
        <small>Credenciales de prueba</small><br>
        <small><strong>admin</strong> - <strong>1357</strong></small>
      </div>
      <div id="alertContainer"></div>
    </form>
  </main>
  <script src="js/login.js"></script>
</body>

</html>
